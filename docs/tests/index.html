<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Basira QR — Test Suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f13; color: #e2e8f0; padding: 24px; }
    h1 { font-size: 22px; margin-bottom: 4px; color: #a5b4fc; }
    .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .summary { padding: 14px 18px; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .all-pass { background: #052e16; border: 1px solid #16a34a; color: #4ade80; }
    .has-fail  { background: #2d0a0a; border: 1px solid #dc2626; color: #f87171; }
    .suite { margin-bottom: 18px; border: 1px solid #1e293b; border-radius: 10px; overflow: hidden; }
    .suite-title { padding: 10px 16px; font-weight: 700; font-size: 14px; background: #1e293b; }
    .suite-title.pass { color: #4ade80; }
    .suite-title.fail { color: #f87171; }
    .test { padding: 8px 16px 8px 28px; font-size: 13px; border-top: 1px solid #0f172a; }
    .test.pass { color: #94a3b8; }
    .test.fail { color: #fca5a5; background: #1a0a0a; }
    .detail { font-size: 11px; color: #64748b; margin-top: 4px; font-family: monospace; }
    #loading { color: #64748b; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🧪 Basira QR — Test Suite</h1>
  <p class="subtitle">Open this file in a browser. No server required.</p>
  <div id="loading">Running tests…</div>
  <div id="results"></div>

  <!-- Source modules under test -->
  <script src="../js/storage.js"></script>
  <script src="../js/scanner.js"></script>   <!-- exports UrlValidator -->
  <script src="../js/virustotal.js"></script>

  <!-- Test files -->
  <script src="test-runner.js"></script>
  <script src="urlvalidator.test.js"></script>
  <script src="storage.test.js"></script>
  <script src="virustotal.test.js"></script>

  <!-- Run all suites -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('loading').remove();
      await T.run({
        ...urlValidatorTests,
        ...storageTests,
        ...virusTotalTests,
      });
    });
  </script>
</body>
</html>
